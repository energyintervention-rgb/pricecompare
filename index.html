          <option value="THB">THB — Thai Baht</option>

<script>
  const UNITS = ["g","kg","ml","L","oz","lb","count"];
  const STORES = ["Giant","Tesco","Mydin","Aeon","Lotus","Cold Storage","99 Speedmart","Other"];
  let currency = 'RM';
  let items = [];
  let shoppingList = [];
  let history = [];
  // Currency symbols map
  const CURR_SYMBOLS = {
    MYR:'RM', USD:'$', GBP:'£', EUR:'€', SGD:'S$',
    AUD:'A$', JPY:'¥', CNY:'¥', THB:'฿', IDR:'Rp',
    SAR:'﷼', AED:'د.إ'
  };
  let convRates = {};
  let convFromCode = 'MYR';

  function setCurrency(c) {
    currency = c;
    document.getElementById('curr-display').textContent = c + ' ▾';
    renderItems();
  }

  function toggleConverter() {
    const panel = document.getElementById('converter-panel');
    const open = panel.style.display === 'none';
    panel.style.display = open ? 'block' : 'none';
    if (open && !Object.keys(convRates).length) fetchRates();
  }

  async function fetchRates() {
    const from = document.getElementById('conv-from').value;
    document.getElementById('conv-rate-label').textContent = 'Fetching live rate...';
    try {
      const res = await fetch('https://api.frankfurter.app/latest?from=' + from);
      const data = await res.json();
      convRates = data.rates;
      convRates[from] = 1;
      convFromCode = from;
      updateConverter();
    } catch(e) {
      document.getElementById('conv-rate-label').textContent = 'No internet — using offline rates';
      // Approximate offline fallback rates from MYR
      const offline = {MYR:1,USD:0.213,GBP:0.168,EUR:0.197,SGD:0.288,AUD:0.323,JPY:32.1,CNY:1.54,THB:7.52,IDR:3380,SAR:0.799,AED:0.782};
      const fromRate = offline[from] || 1;
      convRates = {};
      for (const [k,v] of Object.entries(offline)) convRates[k] = v / fromRate;
      convFromCode = from;
      updateConverter();
    }
  }

  function updateConverter() {
    const fromSel = document.getElementById('conv-from');
    const toSel = document.getElementById('conv-to');
    const amount = parseFloat(document.getElementById('conv-amount').value) || 1;
    const from = fromSel.value;
    const to = toSel.value;

    // Refetch if base currency changed
    if (from !== convFromCode) {
      convRates = {};
      fetchRates();
      return;
    }

    const rate = convRates[to];
    if (!rate) return;

    const result = (amount * rate);
    const sym = CURR_SYMBOLS[to] || to;
    const fromSym = CURR_SYMBOLS[from] || from;
    document.getElementById('conv-result-label').textContent = sym + (result >= 100 ? result.toFixed(0) : result.toFixed(2));
    document.getElementById('conv-rate-label').textContent = '1 ' + from + ' = ' + sym + rate.toFixed(4) + ' ' + to;

    // Update app currency to FROM currency
    setCurrency(CURR_SYMBOLS[from] || from);
  }

  function applyFromCurrency() {
    const from = document.getElementById('conv-from').value;
    const sym = CURR_SYMBOLS[from] || from;
    setCurrency(sym);
    document.getElementById('converter-panel').style.display = 'none';
    document.getElementById('curr-display').textContent = sym + ' ▾';
  }

  function switchTab(t) {
    ['compare','list','history','survey'].forEach(n => {
      const el = document.getElementById('bnav-' + n);

  function toBase(val, unit) {
    const m = {g:1,kg:1000,ml:1,L:1000,oz:28.3495,lb:453.592,count:1};
    return val * (m[unit] || 1);
  }

  function calcPPU(price, qty, unit) {
    const base = toBase(qty, unit);
    if (!base) return null;
    const mult = (unit === 'g' || unit === 'ml') ? 100 : 1;
    return { val: (price / base) * mult, label: mult > 1 ? 'per 100' + unit : 'per ' + unit };
  }

  function effectivePrice(price, discount) {
    const d = parseFloat(discount) || 0;
    return price * (1 - d / 100);
  }

  function comparePrices() {
    const parsed = items.map((item, i) => {
      const rawPrice = parseFloat(item.price);
      const qty = parseFloat(item.qty);
      if (!rawPrice || !qty) return null;
      const price = effectivePrice(rawPrice, item.discount);
      const p = calcPPU(price, qty, item.unit);
      if (!p) return null;
      return Object.assign({}, item, { rawPrice, price, qty, ppuVal: p.val, ppuLabel: p.label, label: item.name || 'Item ' + (i+1) });
    }).filter(Boolean);

    const verdictEl = document.getElementById('verdict');

    if (parsed.length < 2) {
      verdictEl.innerHTML = '<div class="warning-box">Add at least 2 items with price and quantity to compare.</div>';
      return;
    }

    const sorted = parsed.slice().sort((a, b) => a.ppuVal - b.ppuVal);
    const best = sorted[0];
    const worst = sorted[sorted.length - 1];
    const savePct = ((worst.ppuVal - best.ppuVal) / worst.ppuVal * 100).toFixed(1);
    const bestBase = toBase(best.qty, best.unit);
    const worstBase = toBase(worst.qty, worst.unit);
    const saveDollar = ((worst.price / worstBase - best.price / bestBase) * worstBase).toFixed(2);

    history.unshift({
      date: new Date().toLocaleDateString('en-MY', {day:'2-digit', month:'short', year:'numeric'}),
      winner: best.label,
      store: best.store || '—',
      ppu: best.ppuVal.toFixed(4),
      ppuLabel: best.ppuLabel,
      currency: currency,
      items: parsed.map(p => ({ name: p.label, store: p.store || '' }))
    });
    if (history.length > 30) history.pop();

    const rankRows = sorted.map((p, idx) =>
      '<div class="rank-row' + (idx === 0 ? ' best' : '') + '">' +
        '<span class="rank-num">#' + (idx+1) + '</span>' +
        '<div style="flex:1;"><div class="rank-name">' + p.label + '</div>' +
        (p.store ? '<div class="rank-store">' + p.store + '</div>' : '') + '</div>' +
        '<div><div class="rank-ppu">' + currency + p.ppuVal.toFixed(4) + ' ' + p.ppuLabel + '</div>' +
        (p.discount ? '<div style="font-size:0.6rem;color:#2d6a4f;">-' + p.discount + '% promo</div>' : '') +
        '</div></div>'
    ).join('');

    const safeName = best.label.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const now = new Date().toLocaleString('en-MY', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const receiptRows = sorted.map((p,idx) =>
      '<div class="receipt-row' + (idx===0?' winner':'') + '">' +
      '<span>' + (idx===0?'★ ':'') + p.label + (p.store?' ('+p.store+')':'') + '</span>' +
      '<span>' + currency + p.ppuVal.toFixed(4) + ' ' + p.ppuLabel + '</span></div>'
    ).join('');

    verdictEl.innerHTML =
      '<div class="verdict">' +
        '<div class="verdict-label">Best Value</div>' +
        '<div class="verdict-winner">' + best.label + '</div>' +
        '<div class="verdict-ppu">' + currency + best.ppuVal.toFixed(4) + ' ' + best.ppuLabel + (best.store ? ' · ' + best.store : '') + '</div>' +
        '<div class="pills">' +
          '<span class="pill">Save ' + savePct + '%</span>' +
          '<span class="pill">Save ' + currency + saveDollar + ' vs priciest</span>' +
          (best.discount ? '<span class="pill">' + best.discount + '% promo applied</span>' : '') +
        '</div>' +
        '<button class="add-winner-btn" onclick="addWinnerToList(\'' + safeName + '\',' + best.price + ',\'' + (best.store||'') + '\')">+ Add winner to shopping list</button>' +
      '</div>' +
      '<div class="ranked-list">' + rankRows + '</div>';
  }

  function handleSurveyPhoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      currentPhotoData = e.target.result;
      document.getElementById('survey-preview').src = currentPhotoData;
      document.getElementById('survey-preview').style.display = 'block';
      document.getElementById('survey-form').style.display = 'block';
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  }

  function saveSurveyPhoto() {
    if (!currentPhotoData) return;
    const store = document.getElementById('survey-store').value || 'Unknown';
    const note = document.getElementById('survey-note').value || '';
    const date = new Date().toLocaleString('en-MY', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
    const id = Date.now();
    const entry = { id, photo: currentPhotoData, store, note, date };

    // Save to IndexedDB
    const request = indexedDB.open('JimatSurvey', 1);
    request.onupgradeneeded = function(e) {
      e.target.result.createObjectStore('photos', { keyPath: 'id' });
    };
    request.onsuccess = function(e) {
      const db = e.target.result;
      const tx = db.transaction('photos', 'readwrite');
      tx.objectStore('photos').add(entry);
      tx.oncomplete = function() {
        cancelSurvey();
        loadSurveyGallery();
      };
    };
  }

  function cancelSurvey() {
    currentPhotoData = null;
    document.getElementById('survey-form').style.display = 'none';
    document.getElementById('survey-preview').style.display = 'none';
    document.getElementById('survey-preview').src = '';
    document.getElementById('survey-note').value = '';
    document.getElementById('survey-store').value = '';
  }

  function loadSurveyGallery() {
    const gallery = document.getElementById('survey-gallery');
    const request = indexedDB.open('JimatSurvey', 1);
    request.onupgradeneeded = function(e) {
      e.target.result.createObjectStore('photos', { keyPath: 'id' });
    };
    request.onsuccess = function(e) {
      const db = e.target.result;
      const tx = db.transaction('photos', 'readonly');
      const store = tx.objectStore('photos');
      const all = store.getAll();
      all.onsuccess = function() {
        const photos = all.result.reverse();
        if (!photos.length) {
          gallery.innerHTML = '<div class="survey-empty">No photos yet.<br>Tap "Take Price Tag Photo" to start.</div>';
          return;
        }
      };
    };
  }

  // ============ PROPER SERVICE WORKER ============
  if ('serviceWorker' in navigator) {
    const CACHE = 'jimat-v1';
    const swCode = `
      const CACHE_NAME = 'jimat-v1';
      const ASSETS = [
        self.location.pathname.replace('/sw.js','') + '/',
        'https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono&display=swap'
      ];

      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open(CACHE_NAME).then(cache => {
            return cache.addAll(ASSETS).catch(() => {});
          }).then(() => self.skipWaiting())
        );
      });

      self.addEventListener('activate', e => {
        e.waitUntil(
          caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
          ).then(() => clients.claim())
        );
      });

      self.addEventListener('fetch', e => {
        if (e.request.method !== 'GET') return;
        const url = new URL(e.request.url);

        // Network first for currency API
        if (url.hostname === 'api.frankfurter.app') {
          e.respondWith(
            fetch(e.request)
              .then(res => {
                const clone = res.clone();
                caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
                return res;
              })
              .catch(() => caches.match(e.request))
          );
          return;
        }

        // Cache first for everything else
        e.respondWith(
          caches.match(e.request).then(cached => {
            if (cached) return cached;
            return fetch(e.request).then(res => {
              if (!res || res.status !== 200 || res.type === 'opaque') return res;
              const clone = res.clone();
              caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
              return res;
            }).catch(() => caches.match('/'));
          })
        );
      });
    `;

    // Only register SW when served from http/https (not blob/file)
    const proto = window.location.protocol;
    if (proto === 'http:' || proto === 'https:') {
      const blob = new Blob([swCode], {type: 'application/javascript'});
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).then(reg => {
        if (reg.installing) {
          caches.open(CACHE).then(cache => {
            cache.add(window.location.href);
          });
        }
        console.log('Jimat SW registered — offline mode active');
      }).catch(err => console.log('SW note:', err.message));

    // Also cache all external fonts and resources on load
    window.addEventListener('load', function() {
      caches.open(CACHE).then(function(cache) {
        // Cache the page itself
        cache.add(window.location.href).catch(() => {});
        // Cache fonts
        cache.add('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono&display=swap').catch(() => {});
      });
    });
  }

</script>
</body>
</html>
