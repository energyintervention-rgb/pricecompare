<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Price Compare Pro</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PriceCompare">
  <meta name="application-name" content="PriceCompare">
  <meta name="theme-color" content="#f5f0e8">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20192%20192%22%3E%0A%20%20%3Crect%20width%3D%22192%22%20height%3D%22192%22%20rx%3D%2240%22%20fill%3D%22%232d6a4f%22%2F%3E%0A%20%20%3Cg%20transform%3D%22translate%2832%2C32%29%22%20fill%3D%22white%22%3E%0A%20%20%20%20%3C%21--%20cart%20body%20--%3E%0A%20%20%20%20%3Cpath%20d%3D%22M10%2016%20L18%2016%20L28%2072%20L100%2072%20L112%2032%20L24%2032%22%20stroke%3D%22white%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20fill%3D%22none%22%2F%3E%0A%20%20%20%20%3C%21--%20wheels%20--%3E%0A%20%20%20%20%3Ccircle%20cx%3D%2242%22%20cy%3D%2288%22%20r%3D%229%22%20fill%3D%22white%22%2F%3E%0A%20%20%20%20%3Ccircle%20cx%3D%2288%22%20cy%3D%2288%22%20r%3D%229%22%20fill%3D%22white%22%2F%3E%0A%20%20%20%20%3C%21--%20handle%20bar%20top%20--%3E%0A%20%20%20%20%3Cline%20x1%3D%220%22%20y1%3D%2216%22%20x2%3D%2218%22%20y2%3D%2216%22%20stroke%3D%22white%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22%2F%3E%0A%20%20%3C%2Fg%3E%0A%3C%2Fsvg%3E">
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Price+Compare+Pro%22%2C%22short_name%22%3A%22PriceCompare%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f0e8%22%2C%22theme_color%22%3A%22%23333333%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%2527http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%2527%2520viewBox%3D%25270%25200%2520192%2520192%2527%253E%253Crect%2520width%3D%2527192%2527%2520height%3D%2527192%2527%2520rx%3D%252740%2527%2520fill%3D%2527%2523333%2527%2F%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', monospace; background: #f5f0e8; min-height: 100vh; }
    .app { max-width: 560px; margin: 0 auto; padding: 20px 16px 60px; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .header h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; }
    .header p { font-size: 0.68rem; color: #888; margin-top: 2px; }
    .tag { display: inline-block; background: #333; color: #f5f0e8; font-size: 0.58rem; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; }
    .curr-btn { font-size: 0.7rem; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e0d8cc; background: #333; color: #f5f0e8; cursor: pointer; font-family: 'DM Mono', monospace; font-weight: bold; }
    .converter-panel { background: #fff; border: 1.5px solid #e0d8cc; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    .conv-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .conv-amount-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .conv-col { display: flex; flex-direction: column; justify-content: flex-end; }
    .conv-result-box { background: #f8f5f0; border-radius: 8px; padding: 8px 10px; justify-content: center; }
    .conv-result-label { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; color: #2d6a4f; }
    .conv-rate-label { font-size: 0.6rem; color: #aaa; margin-top: 2px; }
    .conv-actions { }
    .tabs { display: flex; gap: 4px; background: #ebe5d8; border-radius: 10px; padding: 4px; margin-bottom: 16px; }
    .tab { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 7px; font-size: 0.7rem; cursor: pointer; color: #888; font-family: 'DM Mono', monospace; }
    .tab.active { background: #fff; color: #333; font-weight: bold; }
    .section { display: none; }
    .section.active { display: block; }
    .item-card { background: #fff; border: 1.5px solid #e0d8cc; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: bold; }
    .remove-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 1.2rem; padding: 0 4px; }
    .remove-btn:hover { color: #e07070; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .field-row.three { grid-template-columns: 2fr 1fr 1fr; }
    .field-label { font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; display: block; color: #888; }
    input[type="number"], input[type="text"], select {
      width: 100%; background: #f8f5f0; border: 1.5px solid #e0d8cc; border-radius: 6px;
      padding: 6px 8px; font-family: 'DM Mono', monospace; font-size: 0.75rem; color: #333;
    }
    input:focus, select:focus { border-color: #333; outline: none; }
    .discount-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .discount-row input { width: 60px; }
    .discount-label { font-size: 0.65rem; color: #888; }
    .btn { width: 100%; padding: 10px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: bold; cursor: pointer; margin-bottom: 6px; }
    .btn-primary { background: #333; color: #f5f0e8; border: none; }
    .btn-primary:hover { background: #555; }
    .btn-outline { background: none; border: 1.5px solid #e0d8cc; color: #333; }
    .btn-outline:hover { border-color: #333; }
    .verdict { background: #2d6a4f; border-radius: 12px; padding: 16px; margin-top: 12px; color: #f5f0e8; }
    .verdict-label { font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.8; }
    .verdict-winner { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 800; }
    .verdict-ppu { font-size: 0.7rem; opacity: 0.8; margin-top: 2px; }
    .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .pill { font-size: 0.62rem; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.18); }
    .ranked-list { margin-top: 12px; }
    .rank-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; background: #fff; border: 1.5px solid #e0d8cc; }
    .rank-row.best { background: #f0faf4; border-color: #2d6a4f; }
    .rank-num { font-size: 0.65rem; font-weight: bold; width: 20px; color: #aaa; }
    .rank-row.best .rank-num { color: #2d6a4f; }
    .rank-name { flex: 1; font-size: 0.72rem; }
    .rank-store { font-size: 0.6rem; color: #aaa; }
    .rank-ppu { font-size: 0.65rem; color: #555; text-align: right; }
    .list-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; background: #fff; border: 1.5px solid #e0d8cc; }
    .list-item.checked { opacity: 0.5; }
    .list-item-name { flex: 1; font-size: 0.72rem; }
    .list-item.checked .list-item-name { text-decoration: line-through; }
    .list-item-store { font-size: 0.6rem; color: #aaa; }
    .list-item-price { font-size: 0.72rem; font-weight: bold; }
    .check-btn { background: none; border: 1.5px solid #e0d8cc; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .check-btn.done { background: #2d6a4f; border-color: #2d6a4f; color: #fff; }
    .total-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #fff; border: 1.5px solid #e0d8cc; border-radius: 8px; margin-top: 8px; }
    .total-label { font-size: 0.65rem; color: #888; }
    .total-val { font-size: 0.9rem; font-weight: bold; }
    .history-card { background: #fff; border: 1.5px solid #e0d8cc; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .history-date { font-size: 0.6rem; color: #aaa; margin-bottom: 4px; }
    .history-winner { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: bold; }
    .history-ppu { font-size: 0.65rem; color: #555; }
    .history-items { font-size: 0.6rem; color: #aaa; margin-top: 4px; }
    .win-badge { display: inline-block; font-size: 0.55rem; padding: 2px 8px; border-radius: 20px; background: #e8f5ee; color: #2d6a4f; margin-left: 6px; }
    .empty-state { text-align: center; padding: 32px; color: #aaa; font-size: 0.72rem; line-height: 1.8; }
    .add-winner-btn { display: inline-block; font-size: 0.65rem; padding: 5px 12px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.4); background: none; color: #f5f0e8; cursor: pointer; font-family: 'DM Mono', monospace; margin-top: 10px; }
    .add-winner-btn:hover { background: rgba(255,255,255,0.15); }
    .warning-box { background: #fff7ed; border: 1.5px solid #f5c084; border-radius: 10px; padding: 12px 14px; color: #8a5a00; font-size: 0.7rem; margin-top: 10px; }
    .list-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .list-add-row input { flex: 1; }
    .list-add-row button { width: auto; padding: 7px 16px; margin-bottom: 0; }

    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <span class="tag">Supermarket Tool</span>
      <h1>Price Compare Pro</h1>
      <p>Best value · store tracker · shopping list · history</p>
    </div>
    <button class="curr-btn active" id="curr-display" onclick="toggleConverter()">RM ▾</button>
  </div>

  <div class="converter-panel" id="converter-panel" style="display:none;">
    <div class="conv-row">
      <div class="conv-col">
        <label class="field-label">My currency</label>
        <select id="conv-from" onchange="updateConverter()">
          <option value="MYR">MYR — Malaysian Ringgit</option>
          <option value="USD">USD — US Dollar</option>
          <option value="GBP">GBP — British Pound</option>
          <option value="EUR">EUR — Euro</option>
          <option value="SGD">SGD — Singapore Dollar</option>
          <option value="AUD">AUD — Australian Dollar</option>
          <option value="JPY">JPY — Japanese Yen</option>
          <option value="CNY">CNY — Chinese Yuan</option>
          <option value="THB">THB — Thai Baht</option>
          <option value="IDR">IDR — Indonesian Rupiah</option>
          <option value="SAR">SAR — Saudi Riyal</option>
          <option value="AED">AED — UAE Dirham</option>
        </select>
      </div>
      <div class="conv-col">
        <label class="field-label">Compare with</label>
        <select id="conv-to" onchange="updateConverter()">
          <option value="USD">USD — US Dollar</option>
          <option value="MYR">MYR — Malaysian Ringgit</option>
          <option value="GBP">GBP — British Pound</option>
          <option value="EUR">EUR — Euro</option>
          <option value="SGD">SGD — Singapore Dollar</option>
          <option value="AUD">AUD — Australian Dollar</option>
          <option value="JPY">JPY — Japanese Yen</option>
          <option value="CNY">CNY — Chinese Yuan</option>
          <option value="THB">THB — Thai Baht</option>
          <option value="IDR">IDR — Indonesian Rupiah</option>
          <option value="SAR">SAR — Saudi Riyal</option>
          <option value="AED">AED — UAE Dirham</option>
        </select>
      </div>
    </div>
    <div class="conv-amount-row">
      <div class="conv-col">
        <label class="field-label">Amount</label>
        <input type="number" id="conv-amount" value="1" min="0" step="any" oninput="updateConverter()">
      </div>
      <div class="conv-col conv-result-box">
        <div class="conv-result-label" id="conv-result-label">= —</div>
        <div class="conv-rate-label" id="conv-rate-label">Fetching rate...</div>
      </div>
    </div>
    <div class="conv-actions">
      <button class="btn btn-primary" style="margin-bottom:0;" onclick="applyFromCurrency()">Use as my price currency</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('compare')">Compare</button>
    <button class="tab" onclick="switchTab('list')">Shopping List</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <div id="tab-compare" class="section active">
    <div id="items-container"></div>
    <button class="btn btn-outline" onclick="addItem()">+ Add Item</button>
    <button class="btn btn-primary" onclick="comparePrices()">Compare Prices</button>
    <button class="btn btn-outline" style="color:#c0392b; border-color:#e8c5c0;" onclick="resetAll()">Reset</button>

    <div id="verdict"></div>
  </div>

  <div id="tab-list" class="section">
    <div class="list-add-row">
      <input type="text" id="list-input" placeholder="Type item name to add..." onkeydown="if(event.key==='Enter')addToListManual()">
      <button class="btn btn-primary" onclick="addToListManual()">Add</button>
    </div>
    <div id="list-container"></div>
    <div class="total-bar" id="list-total" style="display:none;">
      <span class="total-label">Estimated total</span>
      <span class="total-val" id="list-total-val">—</span>
    </div>
    <button class="btn btn-outline" onclick="clearChecked()" style="margin-top:8px;">Clear Checked Items</button>
  </div>

  <div id="tab-history" class="section">
    <div id="history-container"></div>
    <button class="btn btn-outline" onclick="clearHistory()">Clear History</button>
  </div>
</div>

<script>
  const UNITS = ["g","kg","ml","L","oz","lb","count"];
  const STORES = ["Giant","Tesco","Mydin","Aeon","Lotus's","Cold Storage","99 Speedmart","Other"];
  let currency = 'RM';
  let items = [];
  let shoppingList = [];
  let history = [];
  // Currency symbols map
  const CURR_SYMBOLS = {
    MYR:'RM', USD:'$', GBP:'£', EUR:'€', SGD:'S$',
    AUD:'A$', JPY:'¥', CNY:'¥', THB:'฿', IDR:'Rp',
    SAR:'﷼', AED:'د.إ'
  };
  let convRates = {};
  let convFromCode = 'MYR';

  function setCurrency(c) {
    currency = c;
    document.getElementById('curr-display').textContent = c + ' ▾';
    renderItems();
  }

  function toggleConverter() {
    const panel = document.getElementById('converter-panel');
    const open = panel.style.display === 'none';
    panel.style.display = open ? 'block' : 'none';
    if (open && !Object.keys(convRates).length) fetchRates();
  }

  async function fetchRates() {
    const from = document.getElementById('conv-from').value;
    document.getElementById('conv-rate-label').textContent = 'Fetching live rate...';
    try {
      const res = await fetch('https://api.frankfurter.app/latest?from=' + from);
      const data = await res.json();
      convRates = data.rates;
      convRates[from] = 1;
      convFromCode = from;
      updateConverter();
    } catch(e) {
      document.getElementById('conv-rate-label').textContent = 'No internet — using offline rates';
      // Approximate offline fallback rates from MYR
      const offline = {MYR:1,USD:0.213,GBP:0.168,EUR:0.197,SGD:0.288,AUD:0.323,JPY:32.1,CNY:1.54,THB:7.52,IDR:3380,SAR:0.799,AED:0.782};
      const fromRate = offline[from] || 1;
      convRates = {};
      for (const [k,v] of Object.entries(offline)) convRates[k] = v / fromRate;
      convFromCode = from;
      updateConverter();
    }
  }

  function updateConverter() {
    const fromSel = document.getElementById('conv-from');
    const toSel = document.getElementById('conv-to');
    const amount = parseFloat(document.getElementById('conv-amount').value) || 1;
    const from = fromSel.value;
    const to = toSel.value;

    // Refetch if base currency changed
    if (from !== convFromCode) {
      convRates = {};
      fetchRates();
      return;
    }

    const rate = convRates[to];
    if (!rate) return;

    const result = (amount * rate);
    const sym = CURR_SYMBOLS[to] || to;
    const fromSym = CURR_SYMBOLS[from] || from;
    document.getElementById('conv-result-label').textContent = sym + (result >= 100 ? result.toFixed(0) : result.toFixed(2));
    document.getElementById('conv-rate-label').textContent = '1 ' + from + ' = ' + sym + rate.toFixed(4) + ' ' + to;

    // Update app currency to FROM currency
    setCurrency(CURR_SYMBOLS[from] || from);
  }

  function applyFromCurrency() {
    const from = document.getElementById('conv-from').value;
    const sym = CURR_SYMBOLS[from] || from;
    setCurrency(sym);
    document.getElementById('converter-panel').style.display = 'none';
    document.getElementById('curr-display').textContent = sym + ' ▾';
  }

  function switchTab(t) {
    document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['compare','list','history'][i] === t));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-' + t).classList.add('active');
    if (t === 'list') renderList();
    if (t === 'history') renderHistory();
  }

  function toBase(val, unit) {
    const m = {g:1,kg:1000,ml:1,L:1000,oz:28.3495,lb:453.592,count:1};
    return val * (m[unit] || 1);
  }

  function calcPPU(price, qty, unit) {
    const base = toBase(qty, unit);
    if (!base) return null;
    const mult = (unit === 'g' || unit === 'ml') ? 100 : 1;
    return { val: (price / base) * mult, label: mult > 1 ? 'per 100' + unit : 'per ' + unit };
  }

  function effectivePrice(price, discount) {
    const d = parseFloat(discount) || 0;
    return price * (1 - d / 100);
  }

  function addItem() {
    items.push({ name:"", price:"", qty:"", unit:"g", store:"", discount:"" });
    renderItems();
  }

  function removeItem(i) {
    items.splice(i, 1);
    renderItems();
    document.getElementById('verdict').innerHTML = '';
  }

  function updateItem(i, f, v) { items[i][f] = v; }

  function renderItems() {
    const c = document.getElementById('items-container');
    c.innerHTML = '';
    items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'item-card';
      div.innerHTML =
        '<div class="card-header">' +
          '<span class="card-title">Item ' + (i+1) + '</span>' +
          '<button class="remove-btn" onclick="removeItem(' + i + ')">×</button>' +
        '</div>' +
        '<div class="field-row">' +
          '<div><label class="field-label">Product Name</label>' +
          '<input type="text" value="' + item.name + '" placeholder="e.g. Milo 1kg" oninput="updateItem(' + i + ',\'name\',this.value)"></div>' +
          '<div><label class="field-label">Store</label>' +
          '<select onchange="updateItem(' + i + ',\'store\',this.value)">' +
          '<option value="">— store —</option>' +
          STORES.map(s => '<option value="' + s + '"' + (item.store===s?' selected':'') + '>' + s + '</option>').join('') +
          '</select></div>' +
        '</div>' +
        '<div class="field-row three">' +
          '<div><label class="field-label">Price (' + currency + ')</label>' +
          '<input type="number" min="0" step="0.01" value="' + item.price + '" placeholder="0.00" oninput="updateItem(' + i + ',\'price\',this.value)"></div>' +
          '<div><label class="field-label">Qty</label>' +
          '<input type="number" min="0" value="' + item.qty + '" placeholder="0" oninput="updateItem(' + i + ',\'qty\',this.value)"></div>' +
          '<div><label class="field-label">Unit</label>' +
          '<select onchange="updateItem(' + i + ',\'unit\',this.value)">' +
          UNITS.map(u => '<option value="' + u + '"' + (item.unit===u?' selected':'') + '>' + u + '</option>').join('') +
          '</select></div>' +
        '</div>' +
        '<div class="discount-row">' +
          '<input type="number" min="0" max="100" value="' + item.discount + '" placeholder="0" oninput="updateItem(' + i + ',\'discount\',this.value)">' +
          '<span class="discount-label">% promo / discount</span>' +
        '</div>';
      c.appendChild(div);
    });
  }

  function comparePrices() {
    const parsed = items.map((item, i) => {
      const rawPrice = parseFloat(item.price);
      const qty = parseFloat(item.qty);
      if (!rawPrice || !qty) return null;
      const price = effectivePrice(rawPrice, item.discount);
      const p = calcPPU(price, qty, item.unit);
      if (!p) return null;
      return Object.assign({}, item, { rawPrice, price, qty, ppuVal: p.val, ppuLabel: p.label, label: item.name || 'Item ' + (i+1) });
    }).filter(Boolean);

    const verdictEl = document.getElementById('verdict');

    if (parsed.length < 2) {
      verdictEl.innerHTML = '<div class="warning-box">Add at least 2 items with price and quantity to compare.</div>';
      return;
    }

    const sorted = parsed.slice().sort((a, b) => a.ppuVal - b.ppuVal);
    const best = sorted[0];
    const worst = sorted[sorted.length - 1];
    const savePct = ((worst.ppuVal - best.ppuVal) / worst.ppuVal * 100).toFixed(1);
    const bestBase = toBase(best.qty, best.unit);
    const worstBase = toBase(worst.qty, worst.unit);
    const saveDollar = ((worst.price / worstBase - best.price / bestBase) * worstBase).toFixed(2);

    history.unshift({
      date: new Date().toLocaleDateString('en-MY', {day:'2-digit', month:'short', year:'numeric'}),
      winner: best.label,
      store: best.store || '—',
      ppu: best.ppuVal.toFixed(4),
      ppuLabel: best.ppuLabel,
      currency: currency,
      items: parsed.map(p => ({ name: p.label, store: p.store || '' }))
    });
    if (history.length > 30) history.pop();

    const rankRows = sorted.map((p, idx) =>
      '<div class="rank-row' + (idx === 0 ? ' best' : '') + '">' +
        '<span class="rank-num">#' + (idx+1) + '</span>' +
        '<div style="flex:1;"><div class="rank-name">' + p.label + '</div>' +
        (p.store ? '<div class="rank-store">' + p.store + '</div>' : '') + '</div>' +
        '<div><div class="rank-ppu">' + currency + p.ppuVal.toFixed(4) + ' ' + p.ppuLabel + '</div>' +
        (p.discount ? '<div style="font-size:0.6rem;color:#2d6a4f;">-' + p.discount + '% promo</div>' : '') +
        '</div></div>'
    ).join('');

    const safeName = best.label.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    verdictEl.innerHTML =
      '<div class="verdict">' +
        '<div class="verdict-label">Best Value</div>' +
        '<div class="verdict-winner">' + best.label + '</div>' +
        '<div class="verdict-ppu">' + currency + best.ppuVal.toFixed(4) + ' ' + best.ppuLabel + (best.store ? ' · ' + best.store : '') + '</div>' +
        '<div class="pills">' +
          '<span class="pill">Save ' + savePct + '%</span>' +
          '<span class="pill">Save ' + currency + saveDollar + ' vs priciest</span>' +
          (best.discount ? '<span class="pill">' + best.discount + '% promo applied</span>' : '') +
        '</div>' +
        '<button class="add-winner-btn" onclick="addWinnerToList(\'' + safeName + '\',' + best.price + ',\'' + (best.store||'') + '\')">+ Add winner to shopping list</button>' +
      '</div>' +
      '<div class="ranked-list">' + rankRows + '</div>';
  }

  function addWinnerToList(name, price, store) {
    shoppingList.push({ name: name, price: parseFloat(price) || 0, store: store, checked: false });
    switchTab('list');
  }

  function addToListManual() {
    const inp = document.getElementById('list-input');
    const val = inp.value.trim();
    if (!val) return;
    shoppingList.push({ name: val, price: 0, store: '', checked: false });
    inp.value = '';
    renderList();
  }

  function renderList() {
    const c = document.getElementById('list-container');
    if (!shoppingList.length) {
      c.innerHTML = '<div class="empty-state">No items yet.<br>Compare prices and tap "Add winner to shopping list",<br>or type an item name above.</div>';
      document.getElementById('list-total').style.display = 'none';
      return;
    }
    c.innerHTML = shoppingList.map((item, i) =>
      '<div class="list-item' + (item.checked ? ' checked' : '') + '">' +
        '<button class="check-btn' + (item.checked ? ' done' : '') + '" onclick="toggleCheck(' + i + ')">' + (item.checked ? '✓' : '') + '</button>' +
        '<div style="flex:1;"><div class="list-item-name">' + item.name + '</div>' +
        (item.store ? '<div class="list-item-store">' + item.store + '</div>' : '') + '</div>' +
        (item.price ? '<div class="list-item-price">' + currency + item.price.toFixed(2) + '</div>' : '') +
        '<button class="remove-btn" onclick="removeListItem(' + i + ')">×</button>' +
      '</div>'
    ).join('');

    const total = shoppingList.filter(i => !i.checked && i.price).reduce((s, i) => s + i.price, 0);
    const totalEl = document.getElementById('list-total');
    if (total > 0) {
      totalEl.style.display = 'flex';
      document.getElementById('list-total-val').textContent = currency + total.toFixed(2);
    } else {
      totalEl.style.display = 'none';
    }
  }

  function toggleCheck(i) { shoppingList[i].checked = !shoppingList[i].checked; renderList(); }
  function removeListItem(i) { shoppingList.splice(i, 1); renderList(); }
  function clearChecked() { shoppingList = shoppingList.filter(i => !i.checked); renderList(); }

  function renderHistory() {
    const c = document.getElementById('history-container');
    if (!history.length) {
      c.innerHTML = '<div class="empty-state">No comparisons yet.<br>Compare some products to build your history.</div>';
      return;
    }
    c.innerHTML = history.map(h =>
      '<div class="history-card">' +
        '<div class="history-date">' + h.date + '</div>' +
        '<div style="display:flex;align-items:center;">' +
          '<span class="history-winner">' + h.winner + '</span>' +
          '<span class="win-badge">Winner</span>' +
        '</div>' +
        '<div class="history-ppu">' + h.currency + h.ppu + ' ' + h.ppuLabel + (h.store && h.store !== '—' ? ' · ' + h.store : '') + '</div>' +
        '<div class="history-items">vs. ' + h.items.map(i => i.name + (i.store ? ' (' + i.store + ')' : '')).join(', ') + '</div>' +
      '</div>'
    ).join('');
  }

  function clearHistory() { history = []; renderHistory(); }



  function resetAll() {
    items = [];
    shoppingList = [];
    document.getElementById('verdict').innerHTML = '';
    document.getElementById('list-container').innerHTML = '';
    document.getElementById('list-total').style.display = 'none';
    addItem();
    addItem();
    switchTab('compare');
    window.scrollTo(0, 0);
  }

  addItem();
  addItem();



  // Register inline service worker for offline support
  if ('serviceWorker' in navigator) {
    const swCode = `
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => clients.claim());
      self.addEventListener('fetch', e => {
        e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
      });
    `;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl, {scope: '/'}).catch(()=>{});
  }
</script>
